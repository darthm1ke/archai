# AIos GPU compatibility
# Blacklist nouveau to prevent conflict with nvidia-utils on Optimus laptops.
# Without the full proprietary NVIDIA driver, nouveau + nvidia-utils causes boot hangs.
# nvidia-utils is kept for Vulkan/CUDA support when the proper driver is installed post-boot.
blacklist nouveau
blacklist lbm-nouveau
options nouveau modeset=0

# Prevent NVIDIA power management conflicts on Optimus (Intel+NVIDIA) systems
blacklist nvidia_drm
blacklist nvidia_modeset
