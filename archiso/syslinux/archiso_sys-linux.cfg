LABEL arch
TEXT HELP
Boot the Arch Linux install medium on BIOS.
It allows you to install Arch Linux or perform system maintenance.
ENDTEXT
MENU LABEL ArchAI — Hold Caps Lock to speak, or type to install
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-6.18-x86_64
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-6.18-x86_64.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet loglevel=3 vt.global_cursor_default=0

LABEL archspeech
TEXT HELP
ArchAI with speakup screen reader (for visually impaired users).
ENDTEXT
MENU LABEL ArchAI — speakup accessibility mode
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-6.18-x86_64
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-6.18-x86_64.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet loglevel=3 accessibility=on
