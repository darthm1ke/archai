LABEL arch
TEXT HELP
Boot ArchAI. Hold Caps Lock to speak, or type to interact.
ENDTEXT
MENU LABEL AIos (x86_64, BIOS) - Hold Caps Lock to speak
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-6.18-x86_64
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-6.18-x86_64.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% systemd.journald.forward_to_console=1 console=tty0 console=ttyS0,115200 edd=off cow_space_size=1G
